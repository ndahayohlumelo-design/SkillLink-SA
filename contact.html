<section class="section">
    <h2>Contact Me</h2>
    <p>If you want to help solve unemployment in South Africa, fill in your info and I will contact you.</p>

    <form action="https://formspree.io/f/mwkyvqze" method="POST" class="contact-form">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required placeholder="Your full name">

        <label for="email">Email</label>
        <input type="email" id="email" name="_replyto" required placeholder="Your email address">

        <label for="message">Message / How You Can Help</label>
        <textarea id="message" name="message" rows="5" placeholder="Write your message..." required></textarea>

        <button type="submit">Send</button>
    </form>
</section>
